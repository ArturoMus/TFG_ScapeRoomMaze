<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mi escena VR</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <script src="js/player.js"></script>
    <script src="js/interaction.js"></script>
    <script src="js/objects/door.js"></script>
    <script src="js/objects/button.js"></script>
    <script src="js/space/map.js"></script>
    <script src="js/space/room.js"></script>
    <script src="js/puzzles.js"></script>

</head>
<body>
    <a-scene>

            <!-- Jugador -->
            <!--
                Ahora los controles son con wasd, para cuando use vr probar a añadir esto
                movement-controls="fly: false; speed: 0.1;"
            -->
        <a-entity id="player" player-controls position="0 1.6 0">
            <a-entity camera look-controls>
                <!-- Revisar con la página oficial-->
                <!-- Cursor en el centro de la cámara para wasd -->
                <a-entity cursor-feedback
                    cursor="fuse: false; rayOrigin: entity" 
                    raycaster="objects: .interactable" 
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                    material="color: white; shader: flat; opacity: 0.5; transparent: true"
                    position="0 0 -1">
                </a-entity>
                <!-- Controles para VR, revisar con la página oficial
                    <a-entity 
                        hand-controls="left"
                        laser-controls
                        raycaster="objects: .interactable">
                    </a-entity>
                    <a-entity 
                        hand-controls="right"
                        laser-controls
                        raycaster="objects: .interactable">
                    </a-entity>
                -->
            </a-entity>
        </a-entity>
        
        <!--<a-box position="0 1 -3" color="red" class="interactable" interactable></a-box>
        <a-sphere position="2 1 -5" radius="1" color="blue" class="interactable" interactable></a-sphere>-->
        
        <a-entity map>
            
        </a-entity>

            button="event: openDoor"
            interactable>
        </a-box>

        <a-entity id="doorPivot" position="0 0 -4" door>
            <a-box 
                class="interactable"
                position="-0.5 1 0"
                depth="0.2"
                height="2"

                interactable>
            </a-box>
        </a-entity> -->
        <!--<a-plane rotation="-90 0 0" width="15" height="15" color="green"></a-plane>-->
        <a-sky color="#ECECEC"></a-sky>
    </a-scene>
</body>
</html>
